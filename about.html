<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAA | About</title>
    <link rel="icon" href="assets/logo/logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-about">
    <header class="header">
        <a href="index.html" class="header-logo">
            <img src="assets/logo/logo.png" alt="My Logo">
            <span class="logo-text">NIKKI AZEL</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="about.html" class="active">ABOUT</a></li>
            <li><a href="photos.html">PHOTOS</a></li>
            <li><a href="multimedia.html">MULTIMEDIA</a></li>
        </ul>
    </header>

    <main class="about-container">
        <img src="assets/logo/logo.png" class="about-hero-logo" alt="Logo">
        <h1 class="about-headline reveal-text reveal-active">ABOUT ME</h1>
        
        <p class="about-text">Sample paragraph here. Introduce yourself as a multimedia artist, your passions, and your creative journey. This text is easily replaceable later.</p>

        <div class="contact-box">
            <a href="https://www.linkedin.com/in/nikkiazel11/" target="_blank" class="linkedin-link">
                <img src="assets/icons/icon-in.png" alt="LinkedIn" class="linkedin-icon">
            </a>
        </div>

        <div class="skills-container">
            <div class="software-section">
                <h3 class="section-badge">SOFTWARE</h3>
                <div class="skills-wrapper">
                    <div class="skill-circle" data-percent="85" data-color="#31A8FF">
                        <img src="assets/icons/icon-ps.png" alt="Photoshop">
                        <span class="percent-text">0%</span>
                    </div>
                    <div class="skill-circle" data-percent="90" data-color="#31A8FF">
                        <img src="assets/icons/icon-lr.png" alt="Lightroom">
                        <span class="percent-text">0%</span>
                    </div>
                    <div class="skill-circle" data-percent="80" data-color="#9999FF">
                        <img src="assets/icons/icon-pr.png" alt="Premiere">
                        <span class="percent-text">0%</span>
                    </div>
                </div>
            </div>

            <div class="bar-skills-section">
                <h3 class="section-badge">SKILLS</h3>
                
                <div class="bar-skill-row" data-percent="95">
                    <div class="bar-skill-label">
                        <img src="assets/icons/icon-brush.png" alt="Studio">
                        <span>STUDIO</span>
                    </div>
                    <div class="bar-skill-track"><div class="bar-skill-fill" style="background: #FFD700;"></div></div>
                    <span class="bar-skill-percent">0%</span>
                </div>

                <div class="bar-skill-row" data-percent="65">
                    <div class="bar-skill-label">
                        <img src="assets/icons/icon-painting.png" alt="Graphic">
                        <span>GRAPHIC</span>
                    </div>
                    <div class="bar-skill-track"><div class="bar-skill-fill" style="background: #FF5733;"></div></div>
                    <span class="bar-skill-percent">0%</span>
                </div>

                <div class="bar-skill-row" data-percent="50">
                    <div class="bar-skill-label">
                        <img src="assets/icons/icon-video.png" alt="Video">
                        <span>VIDEO</span>
                    </div>
                    <div class="bar-skill-track"><div class="bar-skill-fill" style="background: #31A8FF;"></div></div>
                    <span class="bar-skill-percent">0%</span>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
