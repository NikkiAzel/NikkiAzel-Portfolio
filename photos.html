<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAA | Photos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-photos">
    <header class="header">
        <a href="index.html" class="header-logo">
            <img src="assets/logo/logo.png" alt="My Logo">
            <span class="logo-text">NIKKI AZEL</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="photos.html" class="active">PHOTOS</a></li>
            <li><a href="multimedia.html">MULTIMEDIA</a></li>
        </ul>
    </header>

    <main class="snap-container">
        <section class="snap-section" id="categories">
            <div class="section-bg-overlay" id="bg-overlay-dash"></div>
            <div class="vignette"></div>
            <div class="category-grid">
                <a href="#real-estate" class="cat-item" data-category="real-estate">
                    <div class="cat-icon-no-circle"><img src="assets/icons/icon-house.png" alt="Real Estate"></div>
                    <span class="cat-title">REAL ESTATE</span>
                </a>
                <a href="#automotive" class="cat-item" data-category="automotive">
                    <div class="cat-icon-no-circle"><img src="assets/icons/icon-car.png" alt="Automotive"></div>
                    <span class="cat-title">AUTOMOTIVE</span>
                </a>
                <a href="#wedding" class="cat-item" data-category="wedding">
                    <div class="cat-icon-no-circle"><img src="assets/icons/icon-ring.png" alt="Wedding"></div>
                    <span class="cat-title">WEDDING</span>
                </a>
                <a href="#food" class="cat-item" data-category="food">
                    <div class="cat-icon-no-circle"><img src="assets/icons/icon-food.png" alt="Food"></div>
                    <span class="cat-title">FOOD</span>
                </a>
                <a href="#profile" class="cat-item" data-category="profile">
                    <div class="cat-icon-no-circle"><img src="assets/icons/icon-profile.png" alt="People"></div>
                    <span class="cat-title">PEOPLE</span>
                </a>
                <a href="#product" class="cat-item" data-category="product">
                    <div class="cat-icon-no-circle"><img src="assets/icons/icon-product.png" alt="Product"></div>
                    <span class="cat-title">PRODUCT</span>
                </a>
            </div>
        </section>

        <section class="snap-section" id="real-estate"><h2 class="reveal-text">REAL ESTATE</h2><div class="slider-wrapper"><button class="slider-btn btn-prev">&#10094;</button><img src="" class="slider-img" data-category="real-estate"><button class="slider-btn btn-next">&#10095;</button></div></section>
        <section class="snap-section" id="automotive"><h2 class="reveal-text">AUTOMOTIVE</h2><div class="slider-wrapper"><button class="slider-btn btn-prev">&#10094;</button><img src="" class="slider-img" data-category="automotive"><button class="slider-btn btn-next">&#10095;</button></div></section>
        <section class="snap-section" id="wedding"><h2 class="reveal-text">WEDDING</h2><div class="slider-wrapper"><button class="slider-btn btn-prev">&#10094;</button><img src="" class="slider-img" data-category="wedding"><button class="slider-btn btn-next">&#10095;</button></div></section>
        <section class="snap-section" id="food"><h2 class="reveal-text">FOOD</h2><div class="slider-wrapper"><button class="slider-btn btn-prev">&#10094;</button><img src="" class="slider-img" data-category="food"><button class="slider-btn btn-next">&#10095;</button></div></section>
        <section class="snap-section" id="profile"><h2 class="reveal-text">PEOPLE</h2><div class="slider-wrapper"><button class="slider-btn btn-prev">&#10094;</button><img src="" class="slider-img" data-category="profile"><button class="slider-btn btn-next">&#10095;</button></div></section>
        <section class="snap-section" id="product"><h2 class="reveal-text">PRODUCT</h2><div class="slider-wrapper"><button class="slider-btn btn-prev">&#10094;</button><img src="" class="slider-img" data-category="product"><button class="slider-btn btn-next">&#10095;</button></div></section>

        <footer class="footer footer-section">PORTFOLIO 2026</footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
