<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body class="page-multimedia">

            <span class="logo-text">NIKKI AZEL</span>

        <ul class="nav-links">
            <li><a href="index.html">HOME</a></li>

            <li><a href="photos.html">PHOTOS</a></li>
            <li><a href="multimedia.html" class="active">MULTIMEDIA</a></li>

    <main class="snap-container">

            <div class="section-bg-overlay" id="bg-overlay-dash"></div>
            <div class="vignette"></div>
            
            <div class="category-grid" id="mm-category-grid">

                <a href="#studio-arts" class="cat-item" data-category="studio"><div class="cat-icon-no-circle"><img src="assets/icons/icon-sculpture.png" alt="Studio"></div><span class="cat-title">STUDIO ARTS</span></a>

            </div>
            <div class="gallery-grid" id="studio-gallery"></div> 
        </section>

        <section class="snap-section has-gallery" id="graphic">

            </div>
            <div class="masonry-grid" id="graphic-gallery"></div>
        </section>

        <section class="snap-section has-gallery" id="video">
            <div class="gallery-header reveal-text">
                <img src="assets/icons/icon-video.png" class="gallery-icon" alt="Icon">
                <h2>VIDEO</h2>
            </div>
            <div class="video-grid">
                <a href="https://drive.google.com/file/d/1xUOENY7twR0dfjxNNxqkz6fVdhkTdD8g/view?usp=drive_link" target="_blank" class="video-item"><img src="assets/photos/video/v-1.jpg" alt="Video 1"></a>

    <div class="lightbox" id="gallery-lightbox"><img src="" alt="View" class="lightbox-img"></div>
    
    <nav class="floating-nav" id="floating-nav">
        <a href="#studio-arts"><img src="assets/icons/icon-sculpture.png" class="float-icon" alt="Studio"></a>
